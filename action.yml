name: 'simple-gal'
description: 'Build a photography gallery with simple-gal'

inputs:
  source:
    description: 'Path to content directory'
    required: false
    default: './content'
  output:
    description: 'Path to output directory'
    required: false
    default: './dist'
  version:
    description: 'simple-gal release version (e.g. "v0.1.1" or "latest")'
    required: false
    default: 'latest'
  cache:
    description: 'Enable processed image caching between builds (true/false)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Resolve version
      id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(gh api repos/arthur-debert/simple-gal/releases/latest --jq '.tag_name')
          echo "Resolved latest → $VERSION"
        fi
        if [[ "$VERSION" != v* ]]; then
          VERSION="v$VERSION"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Download simple-gal binary
      shell: bash
      # Canonical tarball naming + layout (simple-gal v0.20.4+):
      #   simple-gal-x86_64-unknown-linux-gnu.tar.gz
      #     → simple-gal-x86_64-unknown-linux-gnu/simple-gal
      # Older releases used simplified naming (`simple-gal-x86_64-linux-gnu.tar.gz`)
      # with a flat-renamed binary at the archive root. Fall back to that
      # if the canonical URL is missing (404), so this action keeps working
      # against any pinned version.
      run: |
        set -euo pipefail
        VERSION="${{ steps.resolve.outputs.version }}"
        BASE="https://github.com/arthur-debert/simple-gal/releases/download/${VERSION}"

        CANONICAL_TARGET="x86_64-unknown-linux-gnu"
        CANONICAL_URL="${BASE}/simple-gal-${CANONICAL_TARGET}.tar.gz"
        LEGACY_URL="${BASE}/simple-gal-x86_64-linux-gnu.tar.gz"

        TMP="/tmp/simple-gal-fetch"
        rm -rf "$TMP" && mkdir -p "$TMP"

        if curl -fsSL -o "$TMP/archive.tar.gz" "$CANONICAL_URL"; then
          echo "Downloaded canonical layout from $CANONICAL_URL"
          tar -xzf "$TMP/archive.tar.gz" -C "$TMP"
          BIN="$TMP/simple-gal-${CANONICAL_TARGET}/simple-gal"
        elif curl -fsSL -o "$TMP/archive.tar.gz" "$LEGACY_URL"; then
          echo "Downloaded legacy flat layout from $LEGACY_URL"
          tar -xzf "$TMP/archive.tar.gz" -C "$TMP"
          BIN="$TMP/simple-gal-x86_64-linux-gnu"
        else
          echo "::error::Could not download simple-gal binary for ${VERSION} from either canonical or legacy URL"
          exit 1
        fi

        chmod +x "$BIN"
        sudo mv "$BIN" /usr/local/bin/simple-gal
        rm -rf "$TMP"

    - name: Restore processed image cache
      if: inputs.cache == 'true'
      uses: actions/cache@v4
      with:
        path: .simple-gal-temp/processed
        key: simple-gal-processed-${{ hashFiles(format('{0}/**', inputs.source)) }}
        restore-keys: simple-gal-processed-

    - name: Build gallery
      shell: bash
      run: simple-gal --output "${{ inputs.output }}" build --source "${{ inputs.source }}"
